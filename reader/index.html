<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChineseEreader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <p class="eyebrow">ChineseEreader</p>
        <div class="mode-switch" role="group" aria-label="Reader mode">
          <button class="mode-button" id="readModeButton" type="button" data-mode="read">
            <span class="mode-button-label">Read</span>
            <span class="mode-button-caption">Learn the chapter</span>
          </button>
          <button class="mode-button" id="refineModeButton" type="button" data-mode="refine">
            <span class="mode-button-label">Refine</span>
            <span class="mode-button-caption">Improve annotations</span>
          </button>
        </div>
        <p class="lede" id="modeDescription">
          Read the chapter as one continuous scroll. Hover a character to inspect
          its word, and click to pin the containing sentence with pinyin and translation.
        </p>
        <div class="panel" id="chapterPanel"></div>
        <div class="panel refine-panel" id="refinePanel" hidden></div>
        <div class="panel" id="wordPanel">
          <h2>Word</h2>
          <p class="empty">Hover a character.</p>
        </div>
        <div class="panel" id="sentencePanel">
          <h2>Sentence</h2>
          <p class="empty">Click a character.</p>
        </div>
        <div class="panel notes-panel" id="notesPanel" aria-hidden="true">
          <div class="notes-header">
            <h2>Chapter Notes</h2>
            <button class="notes-toggle" id="notesToggle" type="button" aria-expanded="false">
              <span class="notes-toggle-state">Show</span>
            </button>
          </div>
          <div class="notes-body">
          <p class="empty">Chapter-level notes will appear here when available.</p>
          </div>
        </div>
      </aside>
      <main class="stage">
        <div id="chapterStack" class="chapter-stack"></div>
      </main>
    </div>
    <div id="hoverTooltip" class="hover-tooltip" aria-hidden="true"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
